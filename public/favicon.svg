<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- Background Circle -->
    <circle cx="256" cy="256" r="240" fill="url(#grad)" />
    
    <!-- Gradient Definition -->
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" /> <!-- Blue 500 -->
            <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" /> <!-- Indigo 500 -->
        </linearGradient>
    </defs>

    <!-- Cash Register Graphic -->
    <g transform="translate(100, 120)">
        <!-- Screen -->
        <rect x="70" y="20" width="170" height="90" rx="15" fill="#ffffff" />
        <rect x="90" y="40" width="130" height="50" rx="5" fill="#e2e8f0" />
        <text x="155" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#334155" text-anchor="middle">$</text>
        
        <!-- Base/Body -->
        <path d="M40 140 L270 140 C286.5 140 300 153.5 300 170 L300 230 C300 246.5 286.5 260 270 260 L40 260 C23.5 260 10 246.5 10 230 L10 170 C10 153.5 23.5 140 40 140 Z" fill="#ffffff" />
        
        <!-- Drawer line and handle -->
        <line x1="10" y1="200" x2="300" y2="200" stroke="#f1f5f9" stroke-width="4" />
        <rect x="130" y="215" width="50" height="15" rx="7.5" fill="#94a3b8" />
        
        <!-- Buttons -->
        <circle cx="60" cy="165" r="12" fill="#cbd5e1" />
        <circle cx="100" cy="165" r="12" fill="#cbd5e1" />
        <circle cx="140" cy="165" r="12" fill="#cbd5e1" />
        <circle cx="180" cy="165" r="12" fill="#cbd5e1" />
        <circle cx="220" cy="165" r="12" fill="#cbd5e1" />
        <circle cx="260" cy="165" r="12" fill="#ef4444" /> <!-- Red enter button -->
    </g>
</svg>
